<!-- SAC IISER Kolkata — Orbital Ring Decorative Accent -->
<!-- Concentric elliptical orbits with stroke-dasharray animation -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer orbit ring -->
  <ellipse cx="100" cy="100" rx="85" ry="60"
           fill="none" stroke="#4f8ef7" stroke-width="1" opacity="0.25"
           stroke-dasharray="4 8" stroke-linecap="round"
           class="orbital-ring"/>
  <!-- Middle orbit ring -->
  <ellipse cx="100" cy="100" rx="65" ry="48"
           fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.2"
           stroke-dasharray="3 6" stroke-linecap="round"
           class="orbital-ring orbital-ring--mid"/>
  <!-- Inner orbit ring -->
  <ellipse cx="100" cy="100" rx="45" ry="35"
           fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.15"
           stroke-dasharray="2 5" stroke-linecap="round"
           class="orbital-ring orbital-ring--inner"/>
  <!-- Small accent dot at intersection point -->
  <circle cx="145" cy="100" r="2.5" fill="#f59e0b" opacity="0.6"/>
</svg>