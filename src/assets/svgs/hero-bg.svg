<!-- SAC IISER Kolkata — Abstract Hero Background -->
<!-- Large overlapping translucent geometric forms suggesting scientific diagrams -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <!-- Hexagonal grid background -->
  <defs>
    <clipPath id="heroClip">
      <rect x="0" y="0" width="1440" height="900"/>
    </clipPath>
    <radialGradient id="heroGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#heroClip)">
    <!-- Central radial glow -->
    <rect x="0" y="0" width="1440" height="900" fill="url(#heroGrad)"/>

    <!-- Large translucent geometric forms -->
    <polygon points="720,200 920,350 920,550 720,700 520,550 520,350"
             fill="#1e293b" fill-opacity="0.15" transform="rotate(15 720 450)"/>
    <polygon points="400,100 550,250 550,450 400,600 250,450 250,250"
             fill="#0f172a" fill-opacity="0.2" stroke="#1e293b" stroke-opacity="0.15" stroke-width="1"/>
    <polygon points="1000,150 1100,280 1100,480 1000,610 900,480 900,280"
             fill="#1e293b" fill-opacity="0.1" stroke="#334155" stroke-opacity="0.1" stroke-width="0.5"/>

    <!-- Orbital arcs -->
    <path d="M 200,450 A 300,300 0 0,1 500,300" fill="none" stroke="#1e293b" stroke-opacity="0.12" stroke-width="1.5"/>
    <path d="M 1200,300 A 300,300 0 0,1 900,450" fill="none" stroke="#1e293b" stroke-opacity="0.12" stroke-width="1.5"/>
    <path d="M 400,700 A 250,250 0 0,1 650,600" fill="none" stroke="#1e293b" stroke-opacity="0.1" stroke-width="1"/>
    <path d="M 1050,600 A 250,250 0 0,1 1300,700" fill="none" stroke="#1e293b" stroke-opacity="0.1" stroke-width="1"/>

    <!-- Thin connection lines -->
    <line x1="300" y1="250" x2="500" y2="350" stroke="#334155" stroke-opacity="0.08" stroke-width="0.8"/>
    <line x1="500" y1="350" x2="700" y2="300" stroke="#334155" stroke-opacity="0.08" stroke-width="0.8"/>
    <line x1="700" y1="300" x2="900" y2="400" stroke="#334155" stroke-opacity="0.08" stroke-width="0.8"/>
    <line x1="900" y1="400" x2="1100" y2="350" stroke="#334155" stroke-opacity="0.08" stroke-width="0.8"/>
    <line x1="300" y1="650" x2="500" y2="550" stroke="#334155" stroke-opacity="0.08" stroke-width="0.8"/>
    <line x1="500" y1="550" x2="700" y2="600" stroke="#334155" stroke-opacity="0.08" stroke-width="0.8"/>
    <line x1="700" y1="600" x2="900" y2="500" stroke="#334155" stroke-opacity="0.08" stroke-width="0.8"/>
    <line x1="900" y1="500" x2="1100" y2="550" stroke="#334155" stroke-opacity="0.08" stroke-width="0.8"/>

    <!-- Small accent dots at intersections -->
    <circle cx="500" cy="350" r="3" fill="#4f8ef7" fill-opacity="0.15"/>
    <circle cx="700" cy="300" r="3" fill="#06b6d4" fill-opacity="0.15"/>
    <circle cx="900" cy="400" r="3" fill="#7c3aed" fill-opacity="0.15"/>
    <circle cx="1100" cy="350" r="3" fill="#4f8ef7" fill-opacity="0.1"/>
    <circle cx="400" cy="350" r="2" fill="#06b6d4" fill-opacity="0.1"/>
    <circle cx="1000" cy="380" r="2" fill="#7c3aed" fill-opacity="0.1"/>
  </g>
</svg>