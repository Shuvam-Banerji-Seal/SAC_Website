<!-- SAC IISER Kolkata — Grid Overlay Pattern -->
<!-- Fine dot-grid pattern for section overlay texture -->
<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <defs>
    <pattern id="dotGrid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <!-- Dots at grid intersections -->
      <circle cx="0" cy="0" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="20" cy="0" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="40" cy="0" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="60" cy="0" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="0" cy="20" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="20" cy="20" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="40" cy="20" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="60" cy="20" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="0" cy="40" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="20" cy="40" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="40" cy="40" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="60" cy="40" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="0" cy="60" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="20" cy="60" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="40" cy="60" r="0.8" fill="#ffffff" opacity="0.06"/>
      <circle cx="60" cy="60" r="0.8" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="60" height="60" fill="url(#dotGrid)"/>
</svg>