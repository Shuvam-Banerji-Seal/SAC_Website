# =========================================================================
# SAC_Website — GitHub Pages deploy
#
# The site is pure static HTML/CSS/JS with no build step. This workflow
# just uploads the repo contents to GitHub Pages, after first checking
# out the public/assets submodule (which holds the canonical
# assets_map.jsonl + club photos the website reads at runtime).
#
# The site is served at https://<owner>.github.io/SAC_Website/.
# =========================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual re-deploys from the Actions tab

# Cancel any in-progress deploy on the same branch when a new commit
# lands — keeps the deploy queue short and avoids serving half-deployed
# artifacts.
concurrency:
  group: pages
  cancel-in-progress: true

# Required for GitHub Pages deploy + OIDC token verification.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy site
    runs-on: ubuntu-latest
    # 15 minutes is plenty for a static-site upload; if a run blows past
    # that, something else is wrong (huge asset, hung network, etc.).
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          # The SAC_website_assets submodule at public/assets/ contains
          # the processed images and assets_map.jsonl the website reads
          # at runtime. The pretext submodule at utils/pretext isn't
          # strictly needed for the deployed site, but recursive fetch
          # keeps the checkout consistent.
          submodules: recursive
          fetch-depth: 0

      - name: Verify critical paths exist
        run: |
          set -euo pipefail
          test -f index.html            || { echo "::error::index.html missing at repo root"; exit 1; }
          test -d css/                  || { echo "::error::css/ directory missing"; exit 1; }
          test -d js/                   || { echo "::error::js/ directory missing"; exit 1; }
          test -d pages/                || { echo "::error::pages/ directory missing"; exit 1; }
          test -d public/assets/processed || { echo "::error::public/assets submodule not checked out"; exit 1; }
          test -f public/assets/processed/assets_map.jsonl || { echo "::error::assets_map.jsonl missing"; exit 1; }
          test -f .nojekyll             || { echo "::error::.nojekyll missing — GitHub Pages would run Jekyll on the site"; exit 1; }
          echo "All critical paths present."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The entire repo is the site. Asset URLs in the website are
          # absolute paths starting with /SAC_Website/, which matches
          # the default GitHub Pages subpath for a project page.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
