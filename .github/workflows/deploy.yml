# =========================================================================
# SAC_Website — CI/CD pipeline
#
# This workflow runs on every push to main and every PR:
#   1. Installs dependencies
#   2. Runs lint (eslint)
#   3. Runs format check (prettier)
#   4. Runs security audit (npm audit)
#   5. Runs unit tests (vitest)
#   6. Verifies critical paths exist
#   7. Deploys to GitHub Pages (only on main)
#
# The site is pure static HTML/CSS/JS — the npm setup is for testing
# and development tooling only. The deployed site has no build step.
# =========================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Test & Lint ───────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Run lint
        run: npm run lint
        continue-on-error: true # warnings shouldn't block deploy

      - name: Run format check
        run: npm run format:check
        continue-on-error: true

      - name: Run security audit
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify critical paths exist
        run: |
          set -euo pipefail
          test -f index.html            || { echo "::error::index.html missing at repo root"; exit 1; }
          test -d css/                  || { echo "::error::css/ directory missing"; exit 1; }
          test -d js/                   || { echo "::error::js/ directory missing"; exit 1; }
          test -d pages/                || { echo "::error::pages/ directory missing"; exit 1; }
          test -d public/assets/processed || { echo "::error::public/assets submodule not checked out"; exit 1; }
          test -f public/assets/processed/assets_map.jsonl || { echo "::error::assets_map.jsonl missing"; exit 1; }
          test -f .nojekyll             || { echo "::error::.nojekyll missing — GitHub Pages would run Jekyll on the site"; exit 1; }
          test -f js/pretext/layout.js  || { echo "::error::pretext layout.js missing — run npm run build:pretext"; exit 1; }
          echo "All critical paths present."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
